<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- WebView/브라우저에 라이트·다크 둘 다 지원함을 알린다. 실제 적용 외관은
         아래 인라인 스크립트가 OS 외관(prefers-color-scheme)에 맞춰 결정한다.
         "light dark"로 두면 unstyled 단계의 기본 배경/스크롤바/입력 컨트롤 색이
         OS 외관을 따라가, 외부 CSS 로딩 전 한 프레임의 색 어긋남을 막는다. -->
    <meta name="color-scheme" content="light dark" />
    <title>Mallow</title>
    <!-- 외부 CSS 로딩 "전에", 그리고 1차 페인트 전에 OS 외관을 읽어 테마를 확정한다.
         data-theme 속성으로 style.css의 라이트/다크 토큰을 선택하고, html 배경과
         color-scheme를 즉시 맞춰 초기 흰/검 flash를 양쪽 외관 모두에서 막는다.
         (Tauri window backgroundColor가 다크(28,28,30)이므로, 라이트 OS에서는 특히
         이 스크립트가 html을 흰색으로 덮어 첫 프레임부터 일관된 톤을 유지한다.)
         matchMedia 미지원 등 예외 시 기존처럼 다크로 폴백한다. -->
    <script>
      (function () {
        var dark = true
        try {
          dark = window.matchMedia('(prefers-color-scheme: dark)').matches
        } catch (e) {
          /* matchMedia 미지원 → 다크 폴백 */
        }
        var root = document.documentElement
        root.dataset.theme = dark ? 'dark' : 'light'
        root.style.background = dark ? '#1c1c1e' : '#ffffff'
        root.style.colorScheme = dark ? 'dark' : 'light'
      })()
    </script>
  </head>
  <body>
    <!-- data-tauri-drag-region: Tauri(WKWebView)에서 창을 드래그로 이동시키는 표준 방식.
         (-webkit-app-region은 Chromium 전용이라 macOS WKWebView에서는 무시된다.)
         Wry는 mousedown된 "정확한 요소"가 이 속성을 가졌는지만 검사하므로,
         헤더/좌우 빈 영역에만 붙이고 파일명·코너 버튼에는 붙이지 않으면
         빈 영역은 드래그, 버튼은 클릭(편집·동작)이 그대로 유지된다. -->
    <header id="titlebar" data-tauri-drag-region>
      <div class="titlebar-left" data-tauri-drag-region></div>
      <button class="titlebar-center" id="file-name" type="button"></button>
      <div class="titlebar-right" data-tauri-drag-region>
        <button class="corner-btn" id="btn-style">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
        </button>
        <button class="corner-btn" id="btn-pdf">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M12 18v-6"/>
            <path d="m15 15-3 3-3-3"/>
          </svg>
        </button>
        <button class="corner-btn" id="btn-info">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
      </div>
    </header>
    <div id="filename-popover" class="hidden" role="dialog">
      <input id="filename-input" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <main id="editor"></main>
    <div id="stats-popover" class="hidden"></div>
    <div id="style-popover" class="hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
