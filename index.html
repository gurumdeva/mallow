<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- WebView/브라우저에 다크 테마임을 알린다.
         color-scheme: dark는 외부 CSS 로딩 전 unstyled 단계의 기본 배경/스크롤바/입력
         컨트롤 색까지 즉시 다크로 만들어, 간헐적 흰 paint 한 프레임을 막는다. -->
    <meta name="color-scheme" content="dark" />
    <title>Mallow</title>
    <!-- 외부 CSS 로딩 전에 다크 배경을 적용해 초기 흰 flash를 막는다.
         (Tauri window의 backgroundColor와 함께 1차 페인트부터 일관된 톤 유지) -->
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; background: #1c1c1e; color: #f2f2f7; }
    </style>
  </head>
  <body>
    <!-- data-tauri-drag-region: Tauri(WKWebView)에서 창을 드래그로 이동시키는 표준 방식.
         (-webkit-app-region은 Chromium 전용이라 macOS WKWebView에서는 무시된다.)
         Wry는 mousedown된 "정확한 요소"가 이 속성을 가졌는지만 검사하므로,
         헤더/좌우 빈 영역에만 붙이고 파일명·코너 버튼에는 붙이지 않으면
         빈 영역은 드래그, 버튼은 클릭(편집·동작)이 그대로 유지된다. -->
    <header id="titlebar" data-tauri-drag-region>
      <div class="titlebar-left" data-tauri-drag-region></div>
      <button class="titlebar-center" id="file-name" type="button">새 문서.md</button>
      <div class="titlebar-right" data-tauri-drag-region>
        <button class="corner-btn" id="btn-style" title="텍스트 스타일">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
        </button>
        <button class="corner-btn" id="btn-pdf" title="PDF로 내보내기 (⌘E)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M12 18v-6"/>
            <path d="m15 15-3 3-3-3"/>
          </svg>
        </button>
        <button class="corner-btn" id="btn-info" title="문서 정보 (⌘⇧I)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
      </div>
    </header>
    <div id="filename-popover" class="hidden" role="dialog">
      <input id="filename-input" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <main id="editor"></main>
    <div id="stats-popover" class="hidden"></div>
    <div id="style-popover" class="hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
