<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 무지개 그라데이션 (연한 파스텔 톤) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD1DC"/>
      <stop offset="20%"  stop-color="#FFE5B4"/>
      <stop offset="40%"  stop-color="#FFFACD"/>
      <stop offset="60%"  stop-color="#D4F0C8"/>
      <stop offset="80%"  stop-color="#C7E5FA"/>
      <stop offset="100%" stop-color="#E4CFF0"/>
    </linearGradient>

    <!-- 마시멜로 본체 그라데이션 -->
    <linearGradient id="ms-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#FFF7EC"/>
      <stop offset="100%" stop-color="#F0E2D0"/>
    </linearGradient>

    <!-- 부드러운 그림자 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="14" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.18"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 배경의 미세한 발광 -->
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경: macOS Big Sur 표준 — 824x824 squircle, canvas 좌상단 (100,100)에 위치, radius 185 -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg-glow)"/>

  <!-- 마시멜로: 원기둥 형태 -->
  <g transform="translate(512, 540) scale(1.2)" filter="url(#shadow)">
    <!-- 본체 사각형 부분 -->
    <rect x="-220" y="-180" width="440" height="360" fill="url(#ms-body)"/>

    <!-- 하단 둥근 부분 (앞면에서 보이는 곡선) -->
    <ellipse cx="0" cy="180" rx="220" ry="60" fill="url(#ms-body)"/>

    <!-- 상단 둥근 부분 (가장 밝게) -->
    <ellipse cx="0" cy="-180" rx="220" ry="60" fill="#FFFFFF"/>

    <!-- 윗면 부드러운 하이라이트 -->
    <ellipse cx="-40" cy="-188" rx="90" ry="14" fill="#FFFFFF" opacity="0.75"/>

    <!-- 우측 부드러운 음영 (입체감) -->
    <rect x="180" y="-180" width="40" height="360" fill="#000000" opacity="0.04"/>
  </g>
</svg>
