name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app)
        run: npx tsc --noEmit

      - name: Typecheck (tests)
        run: npx tsc -p tsconfig.test.json --noEmit

      - name: Unit tests
        run: npm test
